<div class="section-01-color-palette">
    <!-- Section 1: Color Palette -->
    <section>
      <h2 class="font-display text-2xl font-semibold mb-6 flex items-center gap-3">
        <span class="w-8 h-8 rounded-lg bg-creator-cyan/20 flex items-center justify-center text-creator-cyan">1</span>
        Color Palette
      </h2>

      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <!-- Backgrounds -->
        <div class="space-y-3">
          <p class="text-sm text-creator-muted uppercase tracking-wider">Backgrounds</p>
          <div class="space-y-2">
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-lg bg-creator-bg border border-creator-border"></div>
              <div><p class="font-medium">Base</p><p class="text-xs text-creator-muted">#121218</p></div>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-lg bg-creator-surface"></div>
              <div><p class="font-medium">Surface</p><p class="text-xs text-creator-muted">#1a1a24</p></div>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-lg bg-creator-card"></div>
              <div><p class="font-medium">Card</p><p class="text-xs text-creator-muted">#22222e</p></div>
            </div>
          </div>
        </div>

        <!-- Primary Accents -->
        <div class="space-y-3">
          <p class="text-sm text-creator-muted uppercase tracking-wider">Primary Accents</p>
          <div class="space-y-2">
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-lg bg-creator-coral"></div>
              <div><p class="font-medium">Coral</p><p class="text-xs text-creator-muted">#ff6b6b</p></div>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-lg bg-creator-amber"></div>
              <div><p class="font-medium">Amber</p><p class="text-xs text-creator-muted">#fbbf24</p></div>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-lg bg-creator-cyan"></div>
              <div><p class="font-medium">Cyan</p><p class="text-xs text-creator-muted">#00d4d4</p></div>
            </div>
          </div>
        </div>

        <!-- Status Colors -->
        <div class="space-y-3">
          <p class="text-sm text-creator-muted uppercase tracking-wider">Status</p>
          <div class="space-y-2">
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-lg bg-creator-mint"></div>
              <div><p class="font-medium">Success</p><p class="text-xs text-creator-muted">#34d399</p></div>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-lg bg-creator-sky"></div>
              <div><p class="font-medium">Info</p><p class="text-xs text-creator-muted">#38bdf8</p></div>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-lg bg-creator-rose"></div>
              <div><p class="font-medium">Warning</p><p class="text-xs text-creator-muted">#fb7185</p></div>
            </div>
          </div>
        </div>

        <!-- Text -->
        <div class="space-y-3">
          <p class="text-sm text-creator-muted uppercase tracking-wider">Typography</p>
          <div class="space-y-2">
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-lg bg-creator-text"></div>
              <div><p class="font-medium">Primary</p><p class="text-xs text-creator-muted">#e4e4eb</p></div>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-lg bg-creator-muted"></div>
              <div><p class="font-medium">Muted</p><p class="text-xs text-creator-muted">#71717a</p></div>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-lg bg-creator-border"></div>
              <div><p class="font-medium">Border</p><p class="text-xs text-creator-muted">#2d2d3a</p></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Gradient Examples -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="h-24 rounded-xl bg-gradient-to-r from-creator-coral to-creator-amber flex items-center justify-center font-display font-semibold animated-gradient">Coral → Amber</div>
        <div class="h-24 rounded-xl bg-gradient-to-r from-creator-cyan to-creator-sky flex items-center justify-center font-display font-semibold animated-gradient">Cyan → Sky</div>
        <div class="h-24 rounded-xl bg-gradient-to-r from-creator-mint to-creator-sky flex items-center justify-center font-display font-semibold text-creator-bg animated-gradient">Mint → Sky</div>
      </div>
    </section>

</div>
